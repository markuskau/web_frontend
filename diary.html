<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diary page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="navbar">
        <h1 class="headline">HealthDiary</h1>

        <nav id="nav-links">
          <a href="home.html">Koti</a>
          <a href="bmi.html">BMI-laskin</a>
          <a href="diary.html">Päiväkirja</a>
        </nav>
      </header>
    </div>

    <main>
      <h2>Päiväkirjahaut</h2>

      <button class="get_entries">Hae päiväkirjamerkinnät</button>
      <br />
      <button class="add_entries">Lisää uusi päiväkirjamerkintä</button>

      <section class="diary-card-area"></section>
    </main>

    <footer>Copyright Markus</footer>

    <dialog class="diary_dialog">
      <h2>Päiväkirjamerkintä</h2>
      <p>Tänne voi avata ja muokata tietoa</p>
      <div class="diary_id">ID</div>
      <button id="closeEntryBtn" autofocus>Close</button>
      <button id="deleteEntryBtn">Poista</button>
    </dialog>

    <dialog class="add_entry_dialog">
      <h2>Lisää uusi päiväkirjamerkintä</h2>
      <label>Päivämäärä: <input type="date" id="entryDate" /></label>
      <label>Mieliala: <input type="text" id="mood" /></label>
      <label>Paino (kg): <input type="number" id="weight" /></label>
      <label>Unet (tunnit): <input type="number" id="sleepHours" /></label>
      <label>Muistiinpanot: <textarea id="notes"></textarea></label>
      <button id="addEntryDialogBtn">Add</button>
      <button id="closeAddDialogBtn">Close</button>
    </dialog>
  </body>
  <script type="module" src="/src/js/diary.js"></script>
</html>
