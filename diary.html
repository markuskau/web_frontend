<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diary page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="navbar">
        <h1 class="headline">HealthDiary</h1>

        <nav id="nav-links">
          <a href="home.html">Home</a>
          <a href="bmi.html">BMI-calculator</a>
          <a href="diary.html">Diary</a>
        </nav>
      </header>
    </div>

    <main>
      <h2>Diary searches</h2>

      <button class="get_entries">Search for diary entries</button>
      <br />
      <button class="add_entries">Add a new diary entry</button>

      <section class="diary-card-area"></section>
    </main>

    <footer>Copyright Markus</footer>

    <dialog class="diary_dialog">
      <h2>Diary entry</h2>
      <p>Here you can see the entry id of the diary entry</p>
      <div class="diary_id">ID</div>
      <button id="closeEntryBtn" autofocus>Close</button>
      <button id="deleteEntryBtn" autofocus>Delete</button>
    </dialog>

    <dialog class="add_entry_dialog">
      <h2>Add a new diary entry</h2>
      <label>Date: <input type="date" id="entryDate" /></label>
      <label>Mood: <input type="text" id="mood" /></label>
      <label>Weight (kg): <input type="number" id="weight" /></label>
      <label>Sleep (hrs): <input type="number" id="sleepHours" /></label>
      <label>Notes: <textarea id="notes"></textarea></label>
      <button id="addEntryDialogBtn">Add</button>
      <button id="closeAddDialogBtn">Close</button>
    </dialog>
  </body>
  <script type="module" src="/src/js/diary.js"></script>
</html>
